name: Auto Article Generator

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node .github/scripts/generate-article.js

      - name: Check for changes
        id: changes
        run: |
          git diff --exit-code src/app/insights/articles.ts || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Add auto-generated article"
          title: "📝 Νέο άρθρο - Review needed"
          body: |
            Αυτόματα δημιουργημένο άρθρο βάσει trending topics.
            
            **Πριν κάνεις merge:**
            - Διάβασε το άρθρο
            - Έλεγξε το content
            - Αν είσαι OK, πάτα **Merge**
          branch: "auto-article"
          delete-branch: true